name: SpringBoot CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Maven Project
      run: mvn clean package

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Generate Date Tag
      run: echo "TAG=v$(date +'%d.%m.%y')" >> $GITHUB_ENV

    - name: Build Docker Image
      run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/mongo-application:$TAG .
            docker tag ${{ secrets.DOCKER_USERNAME }}/mongo-application:$TAG ${{ secrets.DOCKER_USERNAME }}/mongo-application:latest

    - name: Push Docker Image
      run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/mongo-application:$TAG
            docker push ${{ secrets.DOCKER_USERNAME }}/mongo-application:latest
